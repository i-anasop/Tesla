name: Build and Deploy Pygame to Web

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pygbag

      - name: Build with Pygbag
        run: pygbag --build .

      - name: Customize Web Output (Favicon & Autostart)
        run: |
          cp assets/tesla.png build/web/favicon.png
          cat << 'EOF' > patch.py
          with open('build/web/index.html', 'r', encoding='utf-8') as f:
              html = f.read()

          head_injection = """
          <link rel="icon" type="image/png" href="favicon.png">
          <style>
              /* Hide all the Pygbag loading text and terminal */
              #terminal, #status, #box { display: none !important; }
              body { background-color: #141419; margin: 0; padding: 0; }
          </style>
          <script>
              window.addEventListener('load', function() {
                  var attemptClick = setInterval(function() {
                      if (window.MM) window.MM.UME = true; // Bypass media wait
                      var btn = document.getElementById('button');
                      if (btn) {
                          btn.click();
                          btn.style.display = 'none';
                          clearInterval(attemptClick);
                      }
                  }, 100);
              });
          </script>
          """
          html = html.replace('</head>', head_injection + '\n</head>')

          with open('build/web/index.html', 'w', encoding='utf-8') as f:
              f.write(html)
          EOF
          python patch.py
